<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feedback Center</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:60px 20px;
}

/* MAIN BOX */
.main-container{
width:100%;
max-width:1100px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(18px);
padding:40px;
border-radius:30px;
box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.header h1{
font-size:32px;
background:linear-gradient(90deg,#38bdf8,#7dd3fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.back-link{
display:inline-block;
margin-top:8px;
color:#94a3b8;
font-size:14px;
text-decoration:none;
transition:0.3s;
}

.back-link:hover{
color:#38bdf8;
}

/* ADD BUTTON */
.add-btn{
background:linear-gradient(90deg,#38bdf8,#0ea5e9);
border:none;
padding:10px 20px;
border-radius:30px;
color:#0f172a;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.add-btn:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(56,189,248,0.4);
}

/* ANALYTICS LINK */
.analytics{
margin-top:15px;
display:inline-block;
color:#7dd3fc;
font-size:14px;
text-decoration:none;
}

.analytics:hover{
text-decoration:underline;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
margin-top:40px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:25px;
transition:0.4s;
border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(56,189,248,0.3);
}

.card h3{
margin-bottom:10px;
color:#7dd3fc;
font-size:18px;
}

.card p{
font-size:14px;
color:#cbd5e1;
}

.stars-display{
color:#facc15;
margin:10px 0;
}

.actions{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.like-btn, .delete-btn{
border:none;
padding:6px 14px;
border-radius:12px;
cursor:pointer;
font-size:13px;
}

.like-btn{
background:#38bdf8;
color:black;
}

.delete-btn{
background:#ef4444;
color:white;
}

.ai-box{
margin-top:15px;
background:rgba(56,189,248,0.1);
padding:10px;
border-radius:12px;
font-size:13px;
color:#7dd3fc;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(8px);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:linear-gradient(145deg,#1e293b,#0f172a);
padding:35px;
border-radius:24px;
width:420px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
display:flex;
flex-direction:column;
gap:20px;
position:relative;
}

.modal-content textarea{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:14px;
padding:15px;
color:white;
resize:none;
height:100px;
outline:none;
}

.star-rating{
display:flex;
justify-content:center;
gap:8px;
font-size:28px;
cursor:pointer;
}

.star-rating span{
color:#334155;
transition:0.3s;
}

.star-rating span.active{
color:#facc15;
transform:scale(1.2);
}

.submit-btn{
background:linear-gradient(90deg,#38bdf8,#0ea5e9);
border:none;
padding:12px;
border-radius:30px;
color:#0f172a;
font-weight:600;
cursor:pointer;
}

.close{
position:absolute;
top:15px;
right:20px;
font-size:20px;
cursor:pointer;
color:#94a3b8;
}

.close:hover{
color:#38bdf8;
}
</style>
</head>

<body>

<div class="main-container">

<div class="header">
<h1>⭐ Feedback Center</h1>
<button class="add-btn" onclick="openModal()">+ Add Feedback</button>
</div>

<a href="{{ url_for('customer_dashboard') }}" class="back-link">← Back to Dashboard</a>
<br>


<div class="grid">

{% for f in feedbacks %}
<div class="card">

<h3>User ID: {{ f.customer_id }}</h3>
<p>{{ f.comment }}</p>

<div class="stars-display">
{% for i in range(f.rating) %} ⭐ {% endfor %}
</div>

<div class="actions">
<form action="{{ url_for('like_feedback', id=f.id) }}">
<button class="like-btn">👍 {{ f.likes }}</button>
</form>

<form method="POST" action="{{ url_for('delete_feedback', id=f.id) }}">
<button class="delete-btn">Delete</button>
</form>
</div>

<div class="ai-box">
🤖 AI Reply: {{ f.ai_reply }}
</div>

</div>
{% endfor %}

</div>

</div>

<!-- MODAL -->
<div class="modal" id="feedbackModal">
<div class="modal-content">

<span class="close" onclick="closeModal()">✕</span>

<h2 style="text-align:center;">Give Your Feedback</h2>

<form method="POST" action="{{ url_for('submit_feedback') }}">

<textarea name="feedback" placeholder="Write your feedback..." required></textarea>

<div class="star-rating" id="starRating">
<span data-value="1">★</span>
<span data-value="2">★</span>
<span data-value="3">★</span>
<span data-value="4">★</span>
<span data-value="5">★</span>
</div>

<input type="hidden" name="rating" id="ratingInput" required>

<button type="submit" class="submit-btn">Submit Feedback</button>

</form>

</div>
</div>

<script>
function openModal(){
document.getElementById('feedbackModal').style.display='flex';
}

function closeModal(){
document.getElementById('feedbackModal').style.display='none';
}

const stars = document.querySelectorAll('#starRating span');
const ratingInput = document.getElementById('ratingInput');

stars.forEach(star=>{
star.addEventListener('click', function(){
let value = this.getAttribute('data-value');
ratingInput.value = value;

stars.forEach(s=>{
if(s.getAttribute('data-value') <= value){
s.classList.add('active');
}else{
s.classList.remove('active');
}
});
});
});
</script>

</body>
</html>
