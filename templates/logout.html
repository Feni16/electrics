<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technofix | Logout</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  background:radial-gradient(circle at top,#0ff,#020617);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* Electric background */
.electric-bg{
  position:absolute;
  inset:0;
  z-index:0;
}
.line{
  position:absolute;
  width:2px;
  height:120%;
  background:linear-gradient(#00ffff,#0044ff);
  opacity:.15;
  animation:move 6s linear infinite;
}
@keyframes move{
  0%{transform:translateY(-120%)}
  100%{transform:translateY(120%)}
}

/* Logout Card */
.card{
  position:relative;
  z-index:1;
  width:380px;
  padding:40px 32px;
  background:#020617;
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,255,255,.35);
  border:1.5px solid #0ff;
  text-align:center;
  color:white;
}

.card h2{
  color:#0ff;
  margin-bottom:10px;
}

.card p{
  font-size:14px;
  color:#9ca3af;
  margin-bottom:25px;
}

.btn{
  width:100%;
  height:48px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  margin-bottom:12px;
  transition:.3s;
}

.logout-btn{
  background:linear-gradient(90deg,#dc2626,#f87171);
  color:white;
}
.logout-btn:hover{
  box-shadow:0 0 20px #f87171;
  transform:scale(1.05);
}

.back-btn{
  background:linear-gradient(90deg,#00e5ff,#0044ff);
  color:#020617;
}
.back-btn:hover{
  box-shadow:0 0 20px #0ff;
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="electric-bg" id="electricBg"></div>

<div class="card">
  <h2>⚡ Technofix</h2>
  <p>Are you sure you want to logout?</p>

  <!-- 🔴 Flask logout -->
  <a href="{{ url_for('logout') }}">
    <button class="btn logout-btn">Logout</button>
  </a>

  <a href="{{ url_for('login') }}">
    <button class="btn back-btn">Back to Login</button>
  </a>
</div>

<script>
const bg=document.getElementById("electricBg");
for(let i=0;i<25;i++){
  let l=document.createElement("div");
  l.className="line";
  l.style.left=Math.random()*100+"vw";
  l.style.animationDuration=(4+Math.random()*5)+"s";
  bg.appendChild(l);
}
</script>

</body>
</html>
