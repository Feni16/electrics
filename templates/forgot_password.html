<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password | TechnoFix AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#020617,#0a0f2c);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#e5e7eb;
}
.card{
    width:460px;
    padding:45px;
    border-radius:25px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(15px);
    box-shadow:0 0 30px rgba(125,211,252,0.25);
    text-align:center;
}
h2{
    font-size:2.2em;
    color:#7dd3fc;
    margin-bottom:10px;
}
.subtitle{
    font-size:0.95em;
    color:#cbd5f5;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border-radius:15px;
    border:1px solid rgba(125,211,252,0.25);
    background:rgba(2,6,23,0.6);
    color:white;
    outline:none;
}
input:focus{
    border-color:#38bdf8;
    box-shadow:0 0 10px rgba(56,189,248,0.4);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#38bdf8;
    color:#020617;
    font-size:1.1em;
    font-weight:600;
    cursor:pointer;
}
button:hover{
    background:#7dd3fc;
}

.link{
    margin-top:15px;
    font-size:0.9em;
}
.link a{
    color:#7dd3fc;
    text-decoration:none;
}

.error{
    color:#f87171;
    margin-bottom:15px;
}

.success{
    color:#4ade80;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="card">
    <h2>🔑 Forgot Password</h2>
    <p class="subtitle">Enter email and set new password</p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Simple Reset Form -->
    <form method="POST" action="/forgot_password">
        <input type="email" name="email" placeholder="Enter your email" required>
        <input type="password" name="password" placeholder="New password" required>
        <input type="password" name="confirm_password" placeholder="Confirm password" required>
        <button type="submit">Reset Password</button>
    </form>

    <div class="link">
        <a href="{{ url_for('login') }}">← Back to Login</a>
    </div>

    <div class="link">
        New User?
        <a href="{{ url_for('register') }}">Register</a>
    </div>
</div>

</body>
</html>
